camera:
  global_index: 0
  local_index: 1
  width: 1280
  height: 720

cup_detection:
  min_area: 900
  max_area: 35000
  min_box_size: 26
  min_fill_ratio: 0.42
  min_solidity: 0.82
  min_circularity: 0.16
  min_aspect_ratio: 0.40
  max_aspect_ratio: 2.60
  max_bbox_area_ratio: 0.18
  min_score: 1200
  colors:
    green:
      cup_id: 0
      lower: [38, 60, 45]
      upper: [92, 255, 255]
      detector_overrides:
        min_area: 650
        min_box_size: 22
        min_fill_ratio: 0.34
        min_solidity: 0.74
        min_circularity: 0.10
        min_aspect_ratio: 0.32
        max_aspect_ratio: 3.00
        min_score: 850
    red:
      cup_id: 1
      lower1: [0, 100, 70]
      upper1: [8, 255, 255]
      lower2: [172, 100, 70]
      upper2: [180, 255, 255]
    blue:
      cup_id: 2
      lower: [96, 90, 60]
      upper: [122, 255, 255]

tracking:
  touch_threshold: 0.12
  touch_release_threshold: 0.16
  default_last_touched_time: 999.0
  user_absence_threshold: 10.0
  time_near_threshold: 0.8
  motion_distance_threshold: 0.03
  stationary_motion_threshold: 0.01
  touch_count_used_threshold: 1
  release_debounce_seconds: 0.35
  release_cooldown_seconds: 1.0

policy:
  confidence_threshold: 0.65
  recent_touch_threshold: 10.0
  ask_delay_after_release: 20.0
  never_active_ask_delay: 60.0
  observe_min_duration: 3.0
  ask_cooldown_seconds: 30.0
  ask_repeat_limit: 1
  ask_pending_timeout: 0.0
  cup_capacity_ml: 390.0
  estimated_sip_ml: 22.0
  ask_drink_count_milestones: [3, 6, 9]
  drink_progress_ask_threshold: 0.65
  drink_time_threshold_strict: 2.0
  drink_motion_threshold_strict: 0.08
  drink_event_cooldown: 3.0
  face_drink_distance_threshold: 0.22
  post_active_idle_ask_threshold: 20.0
  untouched_idle_ask_threshold: 60.0
  cleanup_time_threshold: 30.0
  stationary_threshold: 3.0
  model_input_features:
    - x
    - y
    - hand_distance
    - last_touched_time
    - touch_count
    - moved_recently
    - distance_to_tray
    - user_present
    - user_absent_time
    - is_active_cup
    - time_near_cup
    - time_since_release
    - release_count
    - cup_motion_distance
    - stationary_time
    - was_moved
    - used_cup_candidate
    - idle_candidate
  preprocessing:
    hand_distance_clip_upper: 2.0
    last_touched_time_clip_upper: 60.0
    user_absent_time_clip_upper: 60.0
    time_near_cup_clip_upper: 30.0
    time_since_release_clip_upper: 60.0
    cup_motion_distance_clip_upper: 2.0
    stationary_time_clip_upper: 60.0

local_liquid_detection:
  roi:
    x: 0.35
    y: 0.25
    w: 0.30
    h: 0.35
  min_color_ratio: 0.05
  min_dark_ratio: 0.08
  liquid_colors:
    red:
      lower1: [0, 70, 50]
      upper1: [10, 255, 255]
      lower2: [170, 70, 50]
      upper2: [180, 255, 255]
    blue:
      lower: [90, 50, 50]
      upper: [130, 255, 255]
    orange:
      lower: [10, 70, 50]
      upper: [30, 255, 255]

robot:
  tray_position:
    x: 0.50
    y: 0.20
    z: 0.10

ros2_trigger:
  enabled: true
  ask_topic: "/cup_cleanup/ask_trigger"
  robot_topic: "/cup_cleanup/trigger"
  node_name: "cup_cleanup_trigger_bridge"
  cup_id_to_robot_label:
    0: 1
    1: 2
    2: 0
